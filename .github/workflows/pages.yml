name: Deploy to GitHub Pages

# Publishes ./out to the gh-pages branch (Jekyll disabled via .nojekyll).
# In repo Settings → Pages, use: Branch "gh-pages", folder "/" (NOT "GitHub Actions").

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Uses environment "env" so Environment secrets are available (see README).
    environment: env
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Verify Supabase secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Missing Supabase secrets. Add NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY as repository secrets OR in environment 'env' (see README)."
            exit 1
          fi

      - name: Create .env.production for build
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EOF

      - run: npm run build

      - name: Prepare static site
        run: node scripts/prepare-github-pages.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          enable_jekyll: false
