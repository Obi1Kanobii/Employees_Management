name: Deploy to GitHub Pages

# Deploys static files to the docs/ folder on main.
# In repo Settings → Pages, use: Branch "main", folder "/docs" (NOT "GitHub Actions").

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Verify Supabase secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Missing GitHub secrets. Add NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in Settings → Secrets → Actions"
            exit 1
          fi

      - name: Create .env.production for build
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EOF

      - run: npm run build

      - name: Prepare static site
        run: node scripts/prepare-github-pages.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Publish to docs/ on main
        run: |
          rm -rf docs
          cp -r out docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: deploy site to docs [skip ci]"
          git push
